<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UPI Payment Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <h2>UPI Payment Demo</h2>

    <div class="card">
        <h3>Generate QR</h3>

        <input type="text" id="merchantName" placeholder="Merchant Name" value="DP Jewellers">
        <input type="text" id="upiId" placeholder="UPI ID" value="akshayathavale123-1@oksbi">
        <input type="number" id="amount" placeholder="Amount" value="1">
        <input type="text" id="transactionRef" placeholder="Transaction Ref" value="ORD123">
        <input type="text" id="note" placeholder="Note" value="PADMPAY-TXN123456">

        <button onclick="generateQr()">Generate QR</button>
    </div>

    <div class="card">
        <h3>QR Display</h3>

        <img id="qrImage" src="" alt="QR Code">

        <p id="paymentId"></p>
        <p id="status">Status: PENDING</p>
        <p id="socketStatus">WebSocket: DISCONNECTED</p>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script src="script.js"></script>
</body>
</html>
